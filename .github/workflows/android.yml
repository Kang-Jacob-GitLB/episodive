name: Android CI

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-for-changes:
    runs-on: ubuntu-latest

    outputs:
      source_changes: ${{ steps.check_changes.outputs.source }}

    steps:
      - name: Check for source changes
        uses: dorny/paths-filter@v3
        id: check_changes
        with:
          filters: |
            source:
              - 'app/**'
              - 'core/**'
              - 'feature/**'
              - 'build-logic/**'
              - 'gradle/**'
              - '.github/workflows/**'
              - '*.gradle.kts'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradlew.bat'

  build:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.source_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: >-
          ./gradlew
          createDebugCombinedCoverageReport
          --no-daemon --build-cache --parallel
          -Dorg.gradle.jvmargs="-Dfile.encoding=UTF-8 -XX:+UseG1GC -XX:SoftRefLRUPolicyMSPerMB=1 -XX:ReservedCodeCacheSize=256m -Xmx2g -Xms512m"
          -Pkotlin.daemon.jvmargs="-Dfile.encoding=UTF-8 -XX:+UseG1GC -XX:ReservedCodeCacheSize=320m -Xmx2g -Xms512m"

      - name: Display local test coverage
        id: jacoco
        uses: madrapps/jacoco-report@v1.7.2
        with:
          title: Combined test coverage report
          min-coverage-overall: 70
          min-coverage-changed-files: 80
          paths: |
            ${{ github.workspace }}/**/build/reports/jacoco/**/*Report.xml
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 991664386c54d6464bb3399f02d8e1c1
          filename: coverage.json
          label: Coverage
          message: ${{ steps.jacoco.outputs.coverage-overall }}%
          minColorRange: 50
          maxColorRange: 90
          valColorRange: ${{ steps.jacoco.outputs.coverage-overall }}

  ci:
    needs: build
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check CI result
        run: |
          if [[ "${{ needs.build.result }}" == "success" || "${{ needs.build.result }}" == "skipped" ]]; then
            echo "CI passed (build result: ${{ needs.build.result }})"
          else
            echo "CI failed (build result: ${{ needs.build.result }})"
            exit 1
          fi
